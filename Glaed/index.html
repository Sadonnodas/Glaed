
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaed - Lighting Workstation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .transport-bar {
            background: #111;
            border-bottom: 1px solid #333;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .transport-bar button {
            border: 1px solid #444;
            background: #222;
            color: #fff;
            padding: 6px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .transport-bar button.active {
            background: #ffb400;
            color: #111;
            border-color: #ffb400;
        }
        .transport-status {
            color: #ffb400;
            margin-left: auto;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #stage-viewport {
            flex: 1;
            position: relative;
        }
        #left-sidebar {
            width: 250px;
            background-color: #222;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        #right-sidebar {
            width: 300px;
            background-color: #222;
            padding: 10px;
            overflow-y: auto;
        }
        #dmx-sheet {
            height: 200px;
            background-color: #111;
            padding: 10px;
            overflow-y: scroll;
            margin-top: auto; /* Pushes it to the bottom */
        }
        .dmx-sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        h2, h3 {
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-top: 0;
        }
        .dmx-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
            gap: 2px;
        }
        .dmx-cell {
            background-color: #2a2a2a;
            border-radius: 2px;
            text-align: center;
            font-size: 10px;
            padding: 2px 0;
        }
        .dmx-channel-number {
            color: #888;
        }
        .dmx-channel-value {
            font-weight: bold;
            color: #ffb400;
        }
        .inspector-header {
            margin-bottom: 15px;
        }
        #inspector-fixture-name {
            font-style: italic;
            color: #aaa;
        }
        .inspector-slider {
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 80px 1fr 40px;
            align-items: center;
            gap: 5px;
        }
        .inspector-slider label {
            text-transform: capitalize;
        }
        .inspector-slider input {
            width: 100%;
        }
        .palette-list {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .palette-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1b1b1b;
        }
        .palette-item.active {
            border-color: #ffb400;
            background: #2b1f0f;
        }
        .palette-swatch {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            border: 1px solid #444;
            display: inline-block;
        }
        .palette-name {
            flex: 1;
            color: #fff;
        }
        .palette-form {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .palette-form input,
        .palette-form button {
            padding: 4px 6px;
            border: 1px solid #444;
            border-radius: 3px;
            background: #222;
            color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="transport-bar">
        <button id="btn-go">GO</button>
        <button id="btn-back">BACK</button>
        <button id="btn-clear">CLEAR</button>
        <button id="btn-record">RECORD</button>
        <button id="btn-mirror-toggle">Mirror: ON</button>
        <span class="transport-status" id="transport-status">Live</span>
    </div>

    <div class="main-container">
        <div id="left-sidebar">
            <h2>Fixtures</h2>
            <!-- Fixture list will go here -->

            <div id="cue-list-panel"></div>

            <div id="dmx-sheet"></div>
        </div>

        <div id="stage-viewport"></div>

        <div id="right-sidebar">
            <div id="inspector-panel"></div>
            <div id="palette-panel" style="margin-top:20px;"></div>
            <div id="group-panel" style="margin-top:20px;"></div>
            <div id="kindle-assistant" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="timeline-panel" style="height: 140px; background: #111; border-top: 1px solid #333; padding: 8px;"></div>

    <!-- Third-party libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>


    <!-- Engine -->
    <script src="engine/ArtnetClient.js"></script>
    <script src="engine/PatchEngine.js"></script>
    <script src="engine/Programmer.js"></script>
    <script src="engine/FadeEngine.js"></script>
    <script src="engine/CueList.js"></script>
    <script src="engine/MirrorSystem.js"></script>
    <script src="engine/GroupManager.js"></script>
    <script src="engine/PaletteManager.js"></script>
    <script src="engine/StageEngine.js"></script>

    <!-- Fixtures -->
    <script src="fixtures/_BaseFixture.js"></script>
    <script src="fixtures/WashLight.js"></script>
    <script src="fixtures/ProfileParser.js"></script>

    <!-- UI -->
    <script src="ui/DmxSheet.js"></script>
    <script src="ui/InspectorPanel.js"></script>
    <script src="ui/PalettePanel.js"></script>
    <script src="ui/GroupPanel.js"></script>
    <script src="ui/KindleAssistant.js"></script>
    <script src="ui/CueListPanel.js"></script>
    <script src="ui/TimelinePanel.js"></script>
    <script src="ui/App.js"></script>

</body>
</html>
