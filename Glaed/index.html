<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glaed — Lighting Design Workstation</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a10;
      --bg-mid:     #12121c;
      --bg-card:    #16161f;
      --border:     #2a2a3a;
      --border-dim: #1e1e2a;
      --accent:     #ffb400; /* Amber */
      --accent2:    #ff00ff; /* Magenta */
      --text:       #d4d4e0;
      --text-muted: #7878a0;
      --text-dim:   #454560;
      
      --sidebar-w:  340px;
      --timeline-h: 180px;
      --font-mono:  'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-ui:    system-ui, -apple-system, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      overflow: hidden;
      user-select: none;
    }

    #app { display: flex; width: 100vw; height: 100vh; }

    /* ── Sidebar (Left) ── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      height: 100vh;
      background: var(--bg-mid);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    #sidebar-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-title {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--accent);
    }

    #sidebar-tagline { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-top: 2px; }

    #sidebar-tabs {
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .tab-btn {
      padding: 10px 4px; background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-dim); font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.15s;
    }
    .tab-btn:nth-child(n+4) { border-top: 1px solid var(--border-dim); }
    .tab-btn:hover { color: var(--text-muted); background: rgba(255,255,255,0.03); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, transparent); }

    #sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Main Workspace ── */
    #main-workspace { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Transport Bar ── */
    #transport-bar {
      height: 48px; background: var(--bg-card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 8px; font-family: var(--font-mono); flex-shrink: 0;
    }

    .btn {
      background: var(--bg); border: 1px solid var(--border-dim); color: var(--text);
      padding: 6px 10px; border-radius: 4px; font-family: var(--font-mono); font-size: 10px; cursor: pointer;
    }
    .btn:hover { border-color: var(--text-muted); }
    .btn-go { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); border-color: var(--accent); font-weight: bold; }
    .btn-clear { background: color-mix(in srgb, var(--accent2) 20%, transparent); color: var(--accent2); border-color: var(--accent2); }

    .status-text { color: var(--accent); font-size: 11px; margin-left: auto; font-weight: bold; text-transform: uppercase;}
    .timecode-text { color: #8adeff; font-size: 11px; font-weight: bold; }
    .timer-text { color: var(--accent); font-size: 11px; font-weight: bold; }

    #stage-viewport { flex: 1; position: relative; background: #000; overflow: hidden; }
    #timeline-panel { height: var(--timeline-h); background: var(--bg-mid); border-top: 1px solid var(--border); flex-shrink: 0; padding: 8px; }

    /* General Panel Overrides */
    h2, h3 { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 4px;}
    input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; font-family: var(--font-mono); font-size: 10px; border-radius: 4px; width: 100%; margin-bottom: 8px;}
    button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; cursor: pointer; border-radius: 3px;}
    button:hover { background: var(--border); }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-mid); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Patch Table Styles */
    .patch-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 11px; }
    .patch-table th { background: var(--bg-card); padding: 8px 4px; color: var(--text-muted); font-family: var(--font-mono); border-bottom: 1px solid var(--border); font-weight: normal; }
    .patch-table td { padding: 8px 4px; border-bottom: 1px solid var(--border-dim); color: var(--text-muted); }
    .patch-table tr:hover td { background: rgba(255,255,255,0.03); cursor: default; }
    .patch-controls { display: flex; gap: 4px; margin-bottom: 12px; }
    .patch-controls select { flex: 2; min-width: 0; }
    .patch-controls input { flex: 1; min-width: 0; padding: 4px; text-align: center; }

    /* Floating Toolbar */
    .tool-btn.active { background: var(--accent); color: #000; }
  </style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title">GLAED</div>
      <div id="sidebar-tagline">Lighting Design Workstation</div>
    </div>

    <div id="sidebar-tabs">
      <button class="tab-btn active" data-tab="patch">LIBRARY</button>
      <button class="tab-btn" data-tab="props">PROPS</button>
      <button class="tab-btn" data-tab="groups">GROUPS</button>
      <button class="tab-btn" data-tab="palettes">PALETTES</button>
      <button class="tab-btn" data-tab="cues">CUES</button>
      <button class="tab-btn" data-tab="inspector">INSPECT</button>
      <button class="tab-btn" data-tab="dmx">DMX</button>
      <button class="tab-btn" data-tab="ai" style="grid-column: span 2; color: var(--accent);">KINDLE ASSISTANT</button>
    </div>

    <div id="sidebar-content">
      <div class="tab-panel active" id="tab-patch"><div id="fixture-library-panel"></div></div>
      <div class="tab-panel" id="tab-props"><div id="props-panel"></div></div>
      <div class="tab-panel" id="tab-groups"><div id="group-panel"></div></div>
      <div class="tab-panel" id="tab-palettes"><div id="palette-panel"></div></div>
      <div class="tab-panel" id="tab-cues"><div id="cue-list-panel"></div></div>
      <div class="tab-panel" id="tab-inspector"><div id="inspector-panel"></div></div>
      <div class="tab-panel" id="tab-dmx"><div id="dmx-sheet"></div></div>
      <div class="tab-panel" id="tab-ai"><div id="kindle-assistant"></div></div>
    </div>
  </div>

  <div id="main-workspace">
    <div id="transport-bar">
      <button class="btn btn-go" id="btn-go">GO</button>
      <button class="btn" id="btn-back">BACK</button>
      <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>
      <button class="btn" id="btn-play">PLAY</button>
      <button class="btn" id="btn-pause">PAUSE</button>
      <button class="btn" id="btn-stop">STOP</button>
      
      <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>
      <button class="btn" id="btn-save">SAVE</button>
      <button class="btn" id="btn-load">LOAD</button>
      <input type="file" id="show-file-input" accept=".json" style="display:none" />
      
      <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>
      <button class="btn btn-clear" id="btn-clear">CLEAR</button>
      <button class="btn" id="btn-record">RECORD</button>
      
      <button class="btn" id="btn-mirror-toggle">Mirror: ON</button>
      
      <select id="mode-select" style="width: auto; margin: 0;">
         <option value="design">Design</option>
         <option value="live">Live</option>
         <option value="playback">Playback</option>
      </select>

      <span class="status-text" id="transport-status">Live</span>
      <span class="timecode-text" id="timecode-status">TC: --:--:--:--</span>
      <span class="timer-text" id="show-timer">Elapsed: 00:00</span>
    </div>

    <div id="stage-viewport">
        <div style="position:absolute; top:10px; right:10px; z-index:100; display:flex; gap:4px; background:var(--bg-card); padding:4px; border:1px solid var(--border); border-radius:4px;">
            <button id="tool-worklights" class="btn tool-btn" style="color: #ffcc00; border-color: #ffcc00; margin-right: 8px;">💡 Work Lights: ON</button>
            <button id="tool-move" class="btn tool-btn active">Move (T)</button>
            <button id="tool-rotate" class="btn tool-btn">Rotate (R)</button>
            <button id="tool-scale" class="btn tool-btn">Scale (S)</button>
        </div>
    </div>
    
    <div id="timeline-panel"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

<script src="utils/color.js"></script>
<script src="utils/math.js"></script>

<script src="hardware/TimecodeReceiver.js"></script>
<script src="hardware/MidiBridge.js"></script>

<script src="engine/ShowManager.js"></script>
<script src="engine/ArtnetClient.js"></script>
<script src="engine/PatchEngine.js"></script>
<script src="engine/Programmer.js"></script>
<script src="engine/FadeEngine.js"></script>
<script src="engine/CueList.js"></script>
<script src="engine/MirrorSystem.js"></script>
<script src="engine/GroupManager.js"></script>
<script src="engine/PaletteManager.js"></script>
<script src="engine/StageEngine.js"></script>

<script src="fixtures/_BaseFixture.js"></script>
<script src="fixtures/WashLight.js"></script>
<script src="fixtures/MovingHead.js"></script>
<script src="fixtures/ProfileParser.js"></script>

<script src="ui/TransportBar.js"></script>
<script src="ui/PropsPanel.js"></script>
<script src="ui/DmxSheet.js"></script>
<script src="ui/InspectorPanel.js"></script>
<script src="ui/PalettePanel.js"></script>
<script src="ui/GroupPanel.js"></script>
<script src="ui/FixtureLibraryPanel.js"></script>
<script src="ui/KindleAssistant.js"></script>
<script src="ui/CueListPanel.js"></script>
<script src="ui/TimelinePanel.js"></script>
<script src="ui/App.js"></script>

</body>
</html>
